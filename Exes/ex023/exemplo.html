<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo</title>
    <style>
        table{
            width: 300px;
            border-collapse: collapse;
        }
        th, td{
            border: 1px solid black;
            padding: 5px;
        }
        th{
            background-color: rgba(255, 255, 0, 0.596);
        }
    </style>
</head>
<body>
    <h1>Tabela Exemplo</h1>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Formacao</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Rafael</td>
                <td>21</td>
                <td>Ti</td>
            </tr>
            <tr>
                <td>Carmelita</td>
                <td>61</td>
                <td>Autonoma</td>
            </tr>
            <tr>
                <td>Pablo</td>
                <td>24</td>
                <td>Med. Veterinaria</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
