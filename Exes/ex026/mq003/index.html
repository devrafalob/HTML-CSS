<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mq003</title>
    <style>
        *{
        margin: 0px;
        padding: 0px;
        font-family: Arial, Helvetica, sans-serif;
        }

        html, body{
            width: 100vw;
            height: 100vh;
            background-color: rgb(80, 79, 79);
        }
        h1{
            color: white;
            text-shadow: 3px 3px 0px black;
            padding: 10px;
        }
        @media screen and (orientation: portrait) {
            body{
                background: #233eff url(images/cev-portrait.jpg) no-repeat left bottom;
                background-size: contain;
                    
                }
        }
        @media screen and (orientation: landscape) {
            body{
                background: #233eff url(images/cev-landscape.jpg) no-repeat center bottom;
                background-size: contain;
            }
        }
    </style>
</head>
<body>
    <h1>Orientação</h1>
</body>
</html>
