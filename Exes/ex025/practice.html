<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praticando</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background-color: black;
        }
        body > *{
            background-color: gray;
            max-width: 1000px;
            margin: auto;
        }
        header{
            text-align: center;
            margin: 10px;
        }
        fieldset{
            padding: 5px;
            margin: 0px 20px;
            border: 1px solid lightgray;

        }
        label, input{
            padding: 5px;
            margin-left: 5px;
        }
        .botao{
            border-radius: 10px;

        }
    </style>
</head>
<body>
    <header>
        <h1>Entrevista</h1>
    </header>
    <form action="/cadastrar" method="post" autocomplete="on">
        <fieldset class="pessoal">
            <h2>Informações pessoais</h2>
            <p>
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="iNome" required>
            </p>
            <p>
                <label for="DataNascimento">Data de Nascimento</label>
                <input type="date" name="DataNascimento" id="iDataNascimento" required  placeholder="1999-01-01" >
                <!-- Estudar regex para pattern - será necessario também para javascript placeholder="01-01-1999" pattern="^$\d[2]-->
            </p>
            <p>
                <label for="EstadoCivil">Estado Civil:</label>
                <input type="text" required placeholder="Solteiro, casado, viúvo..." id="EstadoCivil" name="EstadoCivil">
            </p>
            <p>
                <!--Para envio de arquivos deve-se utilizar o metodo post-->
                <label for="ifoto3x4">Sua foto 3x4:</label>
                <input type="file" name="foto3x4" id="ifoto3x4">
            </p>
            <p>
                <label for="iEndereco">Seu Estado de origem:</label>
                <select name="endereco" id="iEndereco">
                    <optgroup label="Região Sudeste">
                        <option value="RJ">Rio de Janeiro</option>
                    </optgroup>

                    <optgroup label="Região Nordeste">
                        <option value="SE" selected>Sergipe</option>
                        <option value="BA">Bahia</option>
                    </optgroup>
                </select>
            </p>
            
        </fieldset>
        <fieldset>
            <h2>Suas Experiencias</h2>
            <p>
                <!-- Para escolhas unicas o --name-- dos objetos devem ser iguais e relacionados com --for-- de cada label-->
                 <p>Possui Experiencias?</p>
                 <input type="radio" name="Experiente" id="iExperiente" value="Sim">
                <label for="iExperiente">Sim</label>

                <input type="radio" name="Experiente" id="naoExperiente" value="Não">
                <label for="naoExperiente">Não</label>
                
            </p>
            <p>
                <label for="iexp">Cargo:</label>
                <input type="text" name="cargo" list="lstCargo" id="iexp">
                <datalist id="lstCargo">
                    <option value="">Gerente</option>
                    <option value="">Desenvolvedor</option>
                </datalist>
            </p>
        </fieldset>

        <input type="submit" value="Enviar" class="botao">
        <input type="reset" value="Limpar" class="botao">
    </form>
    
</body>
</html>
