<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form action="" method="get">
    <p>
        <label for="iusu"> Nome: </label>
        <input type="text" name="usu" id="iusu" required minlength="5" maxlength="15" placeholder="Nome do aluno">
    </p>

    <p>
        <label for="imedia">Media: </label>
        <input type="number" name="media" id="imedia" min="0.0" max="10" placeholder="0 a 10" step="0.1" value="5">
    </p>
    <p>
        <label for="imes">Periodo:</label>
        <input type="date" name="mes" id="imes" value="2026-04-01">
    </p>
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
   </form> 
</body>
</html>
