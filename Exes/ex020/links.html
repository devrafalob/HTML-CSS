<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LInks</title>
    <style>
        /*
            # id
            . class
            : pseudoclasse
            :: pseudoelemento
            > filho
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
        }
        /*Pseudoclasse*/
        a:visited{
            color: blue;
        }
        a:hover{
            text-decoration: underline;
        }
        a:active{
            color:yellow;
        }

        a::after{
            content: '[link]';
            text-decoration: none;
            color: darkgray;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara/html-css/tree/master/aulas-pdf" target="_blank">Repositorio</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/curso/curso-html5-e-css3-modulo-2-de-5-40-horas/aulas/modulo-2-2/modulos/capitulo-15-aula-04-pseudo-elementos-em-css/" target="_blank">Site do Curso</a></li>
    </ul>
</body>
</html>
